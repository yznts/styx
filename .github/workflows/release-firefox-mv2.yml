name: Release Firefox Manifest V2 Extension

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build and upload Firefox MV2 extension
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: firefox-mv2/package-lock.json

      - name: Install dependencies
        run: cd firefox-mv2 && npm ci

      - name: Build Firefox extension
        run: |
          cd firefox-mv2 && \
          npx web-ext build \
            --source-dir src \
            --artifacts-dir artifacts \
            --filename styx-firefox-mv2.zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: styx-firefox-mv2
          path: firefox-mv2/artifacts/styx-firefox-mv2.zip

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: firefox-mv2/artifacts/styx-firefox-mv2.zip
